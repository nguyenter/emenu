{% extends "layout.html" %}

{% block title %}
Thêm bàn
{% endblock %}

{% block content %}

<h2>Thêm bàn mới</h2>

<form method="POST">

    <div class="mb-3">
        <label class="form-label">Tên bàn</label>

        <input type="text"
               name="ten_ban"
               class="form-control"
               placeholder="Ví dụ: B1, VIP1"
               required>
    </div>

    <div class="mb-3">
        <label class="form-label">Khu vực</label>

        <select name="khu_vuc_id"
                class="form-select"
                required>

            <option value="">
                -- Chọn khu vực --
            </option>

            {% for kv in ds_khu_vuc %}

            <option value="{{ kv.id }}">
                {{ kv.ten_khu_vuc }}
            </option>

            {% endfor %}

        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Ghi chú</label>

        <textarea name="ghi_chu"
                  class="form-control"
                  rows="3"></textarea>
    </div>

    <p class="text-muted">
        Số thứ tự sẽ được hệ thống tự động gán theo khu vực.
    </p>

    <button type="submit"
            class="btn btn-success">

        Lưu
    </button>

    <a href="/phong-ban"
       class="btn btn-secondary">

        Quay lại
    </a>

</form>

{% endblock %}
