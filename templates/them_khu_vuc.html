{% extends "layout.html" %}

{% block content %}

<h2>Thêm khu vực</h2>

<form method="POST">

    <div class="mb-3">

        <label>Tên khu vực</label>

        <input type="text"
               name="ten_khu_vuc"
               class="form-control"
               required>

    </div>

    <div class="mb-3">

        <label>Ghi chú</label>

        <textarea name="ghi_chu"
                  class="form-control"></textarea>

    </div>

    <p class="text-muted">
        Số thứ tự sẽ được hệ thống tự động gán.
    </p>

    <button class="btn btn-success">

        Lưu

    </button>

    <a href="/phong-ban"
       class="btn btn-secondary">

        Quay lại

    </a>

</form>

{% endblock %}
