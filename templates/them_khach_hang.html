{% extends "layout.html" %}

{% block content %}

<h2>Thêm khách hàng</h2>

<form method="POST">

    <div class="row">

        <div class="col-md-6 mb-3">

            <label>Mã khách hàng</label>

            <input type="text"
                   name="ma_khach_hang"
                   class="form-control"
                   required>

        </div>

        <div class="col-md-6 mb-3">

            <label>Tên khách hàng</label>

            <input type="text"
                   name="ten_khach_hang"
                   class="form-control"
                   required>

        </div>

    </div>

    <div class="row">

        <div class="col-md-6 mb-3">

            <label>Điện thoại</label>

            <input type="text"
                   name="dien_thoai"
                   class="form-control">

        </div>

        <div class="col-md-6 mb-3">

            <label>Giới tính</label>

            <select name="gioi_tinh"
                    class="form-control">

                <option value="NAM">
                    Nam
                </option>

                <option value="NU">
                    Nữ
                </option>

                <option value="KHAC">
                    Khác
                </option>

            </select>

        </div>

    </div>

    <div class="row">

        <div class="col-md-6 mb-3">

            <label>Ngày sinh</label>

            <input type="date"
                   name="ngay_sinh"
                   class="form-control">

        </div>

        <div class="col-md-6 mb-3">

            <label>Địa chỉ</label>

            <input type="text"
                   name="dia_chi"
                   class="form-control">

        </div>

    </div>

    <div class="row">

        <div class="col-md-6 mb-3">

            <label>Tỉnh/Thành phố</label>

            <input type="text"
                   name="tinh_thanh"
                   class="form-control">

        </div>

        <div class="col-md-6 mb-3">

            <label>Phường/Xã</label>

            <input type="text"
                   name="phuong_xa"
                   class="form-control">

        </div>

    </div>

    <div class="mb-3">

        <label>Ghi chú</label>

        <textarea name="ghi_chu"
                  class="form-control"></textarea>

    </div>

    <button class="btn btn-success">

        Lưu

    </button>

    <a href="/khach-hang"
       class="btn btn-secondary">

        Quay lại

    </a>

</form>

{% endblock %}
