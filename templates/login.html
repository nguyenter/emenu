<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1">
    <title>Đăng nhập eMenu</title>

    <link rel="icon"
          type="image/png"
          href="{{ url_for('static', filename='images/emenu.png') }}">
    <link rel="apple-touch-icon"
          href="{{ url_for('static', filename='images/emenu.png') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        .btn, .form-control {
            min-height: 44px;
        }

        .brand-logo-login {
            display: block;
            max-width: 180px;
            max-height: 72px;
            width: auto;
            height: auto;
            object-fit: contain;
            margin: 0 auto 0.5rem;
        }
    </style>
</head>

<body class="bg-light">

<div class="container py-4 py-md-5">

    <div class="row justify-content-center">

        <div class="col-12 col-sm-10 col-md-6 col-lg-4">

            <div class="card shadow">

                <div class="card-header text-center py-3">
                    <img src="{{ url_for('static', filename='images/emenu.png') }}"
                         alt="eMenu"
                         class="brand-logo-login">
                    <p class="mb-0">Đăng nhập hệ thống</p>
                </div>

                <div class="card-body">

                    {% if error %}
                        <div class="alert alert-danger">
                            {{ error }}
                        </div>
                    {% endif %}

                    <form method="POST">

                        <div class="mb-3">
                            <label class="form-label">Tên đăng nhập</label>

                            <input type="text"
                                   name="ten_dang_nhap"
                                   class="form-control"
                                   autocomplete="username"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mật khẩu</label>

                            <input type="password"
                                   name="mat_khau"
                                   class="form-control"
                                   autocomplete="current-password"
                                   required>
                        </div>

                        <button class="btn btn-primary w-100">
                            Đăng nhập
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
