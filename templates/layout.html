<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}eMenu{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container-fluid">

    <div class="row">

        <div class="col-md-2 bg-dark text-white vh-100">

            <h3 class="mt-3">eMenu</h3>

            <hr>

            <ul class="nav flex-column">

                {% if session.get('vai_tro') == 'QUAN_LY' %}

                <li class="nav-item">
                    <a class="nav-link text-white"
                       href="/dashboard">
                        Dashboard
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white"
                       href="/hang-hoa">
                        Quản lý hàng hóa
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white"
                       href="/nhom-hang">
                        Nhóm hàng
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white"
                       href="/phong-ban">
                        Quản lý phòng/bàn
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white"
                       href="/hoa-don">
                        Quản lý hóa đơn
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white"
                       href="/khach-hang">
                        Quản lý khách hàng
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white"
                       href="/nguoi-dung">
                        Người dùng
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white"
                       href="/chi-nhanh">
                        Chi nhánh
                    </a>
                </li>

                {% endif %}

                <li class="nav-item mt-5">
                    <a class="nav-link text-danger"
                       href="/logout">
                        Đăng xuất
                    </a>
                </li>

            </ul>

        </div>

        <div class="col-md-10">

            <div class="p-4">

                {% block content %}
                {% endblock %}

            </div>

        </div>

    </div>

</div>

</body>
</html>
