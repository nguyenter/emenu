{% extends "layout.html" %}

{% block content %}

<h2>Sửa hàng hóa</h2>

<form method="POST">

    <div class="mb-3">

        <label>Mã hàng</label>

        <input type="text"
               name="ma_hang"
               class="form-control"
               value="{{ hang_hoa.ma_hang }}"
               required>

    </div>

    <div class="mb-3">

        <label>Tên hàng</label>

        <input type="text"
               name="ten_hang"
               class="form-control"
               value="{{ hang_hoa.ten_hang }}"
               required>

    </div>

    <div class="mb-3">

        <label>Nhóm hàng</label>

        <select name="nhom_hang_id"
                class="form-control">

            {% for nhom in nhom_hang %}

            <option value="{{ nhom.id }}"
                {% if hang_hoa.nhom_hang_id == nhom.id %}selected{% endif %}>
                {{ nhom.ten_nhom }}
            </option>

            {% endfor %}

        </select>

    </div>

    <div class="mb-3">

        <label>Đơn vị tính</label>

        <input type="text"
               name="don_vi_tinh"
               class="form-control"
               value="{{ hang_hoa.don_vi_tinh or '' }}">

    </div>

    <div class="mb-3">

        <label>Giá bán</label>

        <input type="number"
               name="gia_ban"
               class="form-control"
               value="{{ hang_hoa.gia_ban }}"
               required>

    </div>

    <div class="mb-3">

        <label>Loại thực đơn</label>

        <select name="loai_thuc_don"
                class="form-control">

            <option value="MON_AN"
                {% if hang_hoa.loai_thuc_don == 'MON_AN' %}selected{% endif %}>
                Món ăn
            </option>

            <option value="DO_UONG"
                {% if hang_hoa.loai_thuc_don == 'DO_UONG' %}selected{% endif %}>
                Đồ uống
            </option>

            <option value="COMBO"
                {% if hang_hoa.loai_thuc_don == 'COMBO' %}selected{% endif %}>
                Combo
            </option>

        </select>

    </div>

    <div class="mb-3">

        <label>Trạng thái</label>

        <select name="trang_thai"
                class="form-control">

            <option value="1"
                {% if hang_hoa.trang_thai %}selected{% endif %}>
                Đang bán
            </option>

            <option value="0"
                {% if not hang_hoa.trang_thai %}selected{% endif %}>
                Ngừng bán
            </option>

        </select>

    </div>

    <button class="btn btn-primary">
        Cập nhật
    </button>

    <a href="/hang-hoa"
       class="btn btn-secondary">
        Quay lại
    </a>

</form>

{% endblock %}
