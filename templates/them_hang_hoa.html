{% extends "layout.html" %}

{% block content %}

<h2>Thêm hàng hóa</h2>

<form method="POST">

    <div class="mb-3">

        <label>Mã hàng</label>

        <input type="text"
               name="ma_hang"
               class="form-control"
               required>

    </div>

    <div class="mb-3">

        <label>Tên hàng</label>

        <input type="text"
               name="ten_hang"
               class="form-control"
               required>

    </div>

    <div class="mb-3">

        <label>Nhóm hàng</label>

        <select name="nhom_hang_id"
                class="form-control">

            {% for nhom in nhom_hang %}

            <option value="{{ nhom.id }}">
                {{ nhom.ten_nhom }}
            </option>

            {% endfor %}

        </select>

    </div>

    <div class="mb-3">

        <label>Đơn vị tính</label>

        <input type="text"
               name="don_vi_tinh"
               class="form-control">

    </div>

    <div class="mb-3">

        <label>Giá bán</label>

        <input type="text"
               name="gia_ban"
               class="form-control gia-ban-input"
               inputmode="numeric"
               placeholder="Ví dụ: 45.000 hoặc 45,000"
               required>

        <small class="text-muted">
            Có thể dùng dấu . hoặc , để tách hàng nghìn (vd: 45.000)
        </small>

    </div>

    <div class="mb-3">

        <label>Loại thực đơn</label>

        <select name="loai_thuc_don"
                class="form-control">

            <option value="MON_AN">
                Món ăn
            </option>

            <option value="DO_UONG">
                Đồ uống
            </option>

            <option value="COMBO">
                Combo
            </option>

        </select>

    </div>

    <button class="btn btn-primary">

        Lưu

    </button>

    <a href="/hang-hoa"
       class="btn btn-secondary">

        Quay lại

    </a>

</form>

{% endblock %}
