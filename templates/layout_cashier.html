<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>
        {% block title %}
            Thu ngân
        {% endblock %}
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            overflow-x: hidden;
        }

        .btn, .form-control, .form-select {
            min-height: 42px;
        }

        .btn-sm {
            min-height: 34px;
        }

        .table-responsive {
            -webkit-overflow-scrolling: touch;
        }

        .cashier-actions .btn {
            margin-bottom: 0.35rem;
        }

        @media (max-width: 575.98px) {
            .navbar-brand {
                font-size: 1rem;
            }

            h2 {
                font-size: 1.25rem;
            }
        }
    </style>
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-md navbar-dark bg-dark sticky-top">

    <div class="container-fluid">

        <span class="navbar-brand mb-0">
            eMenu - Thu ngân
        </span>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#cashierNav"
                aria-controls="cashierNav"
                aria-expanded="false">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse"
             id="cashierNav">

            <div class="navbar-nav ms-auto align-items-md-center gap-2 py-2 py-md-0">

                <span class="navbar-text text-white">
                    Xin chào
                    <strong>{{ session['ho_ten'] }}</strong>
                </span>

                {% if session.get('vai_tro') in ['ADMIN', 'QUAN_LY'] %}
                <a href="/dashboard"
                   class="btn btn-outline-light btn-sm">
                    Về trang quản lý
                </a>
                {% endif %}

                <a href="/logout"
                   class="btn btn-danger btn-sm">
                    Đăng xuất
                </a>

            </div>

        </div>

    </div>

</nav>

<div class="container-fluid mt-3 px-2 px-sm-3 pb-4">

    {% block content %}
    {% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.querySelectorAll('table.table').forEach(function (table) {
    if (!table.parentElement.classList.contains('table-responsive')) {
        var wrap = document.createElement('div');
        wrap.className = 'table-responsive';
        table.parentNode.insertBefore(wrap, table);
        wrap.appendChild(table);
    }
});
</script>

</body>

</html>
