{% extends "layout.html" %}

{% block content %}

<h2>Quản lý khách hàng</h2>

<form method="GET"
      class="row mb-3">

    <div class="col-md-6">

        <input type="text"
               name="keyword"
               class="form-control"
               placeholder="Tìm theo tên, mã hoặc số điện thoại"
               value="{{ request.args.get('keyword', '') }}">

    </div>

    <div class="col-md-2">

        <button class="btn btn-primary">

            Tìm kiếm

        </button>

    </div>

    <div class="col-md-4 text-end">

        <a href="/khach-hang/them"
           class="btn btn-success">

            Thêm khách hàng

        </a>

    </div>

</form>

<table class="table table-bordered">

    <thead>

        <tr>

            <th>Mã khách hàng</th>

            <th>Tên khách hàng</th>

            <th>Điện thoại</th>

            <th>Thao tác</th>

        </tr>

    </thead>

    <tbody>

        {% for kh in ds_khach_hang %}

        <tr>

            <td>

                {{ kh.ma_khach_hang }}

            </td>

            <td>

                {{ kh.ten_khach_hang }}

            </td>

            <td>

                {{ kh.dien_thoai }}

            </td>

            <td>

                <a href="/khach-hang/sua/{{ kh.id }}"
                   class="btn btn-warning btn-sm">

                    Sửa

                </a>

                <a href="/khach-hang/xoa/{{ kh.id }}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Bạn có chắc chắn muốn xóa khách hàng này? Hành động không thể hoàn tác.');">

                    Xóa

                </a>

            </td>

        </tr>

        {% endfor %}

    </tbody>

</table>

{% endblock %}
