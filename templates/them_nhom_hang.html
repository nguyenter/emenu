{% extends "layout.html" %}

{% block content %}

<h2>Thêm nhóm hàng</h2>

<form method="POST">

    <div class="mb-3">

        <label>Tên nhóm</label>

        <input type="text"
               name="ten_nhom"
               class="form-control"
               required>

    </div>

    <p class="text-muted">
        Số thứ tự sẽ được hệ thống tự động gán.
    </p>

    <button class="btn btn-success">

        Lưu

    </button>

    <a href="/nhom-hang"
       class="btn btn-secondary">

        Quay lại

    </a>

</form>

{% endblock %}
