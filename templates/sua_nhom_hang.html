{% extends "layout.html" %}

{% block content %}

<h2>Sửa nhóm hàng</h2>

<form method="POST">

    <div class="mb-3">

        <label class="form-label">

            Mã nhóm

        </label>

        <input type="text"
               class="form-control"
               value="{{ nhom.ma_nhom }}"
               readonly>

    </div>

    <div class="mb-3">

        <label class="form-label">

            Tên nhóm

        </label>

        <input type="text"
               name="ten_nhom"
               class="form-control"
               value="{{ nhom.ten_nhom }}"
               required>

    </div>

    <div class="mb-3">

        <label class="form-label">

            Thứ tự hiển thị

        </label>

        <input type="number"
               name="so_thu_tu"
               class="form-control"
               value="{{ nhom.so_thu_tu }}">

    </div>

    <div class="mb-3">

        <label class="form-label">

            Trạng thái

        </label>

        <select name="trang_thai"
                class="form-select">

            <option value="1"
                {% if nhom.trang_thai %}
                    selected
                {% endif %}>

                Hoạt động

            </option>

            <option value="0"
                {% if not nhom.trang_thai %}
                    selected
                {% endif %}>

                Ngừng hoạt động

            </option>

        </select>

    </div>

    <button type="submit"
            class="btn btn-primary">

        Lưu thay đổi

    </button>

    <a href="/nhom-hang"
       class="btn btn-secondary">

        Quay lại

    </a>

</form>

{% endblock %}
